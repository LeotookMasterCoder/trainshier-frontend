<div class="transaction-table" style="padding: 0; min-height: auto; background: transparent;">

  <h2 style="font-size: 1.4rem; text-align: left; margin-bottom: 20px; font-weight: 700; border-bottom: 1.5px dashed var(--border-soft); padding-bottom: 12px; color: var(--text);">Puntuación de transacciones</h2>

  <div style="width: 100%; overflow-x: auto; border-radius: var(--r-md); border: 1px solid var(--border-soft); background: var(--surface);">
    <table style="width: 100%; border-collapse: collapse; min-width: 650px;">
      <thead>
        <tr>
          <th>ID</th>
          <th>Fecha</th>
          <th>Tipo</th>
          <th>Cliente</th>
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Total</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let t of data">
          <td>{{t.id}}</td>
          <td>{{t.date}}</td>
          <td>{{t.type}}</td>
          <td>{{t.client}}</td>
          <td>{{t.product}}</td>
          <td>{{t.quantity}}</td>
          <td>{{t.total | currency:'COP':'symbol-narrow':'1.0-0'}}</td>
          <td>
            <span
              class="status"
              [class.success]="t.status === 'COMPLETED' || t.status === 'COMPLETADO'"
              [class.error]="t.status === 'FAILED' || t.status === 'NO TERMINADO'"
            ></span>
          </td>
        </tr>
        <tr *ngIf="data.length === 0">
          <td colspan="8" style="text-align: center; color: var(--text-soft); padding: 25px;">No hay transacciones registradas.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
