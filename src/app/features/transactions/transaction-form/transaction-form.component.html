<div class="transaction-container">

  <div class="card">

    <h2>
      Registrar Venta
    </h2>

    <form
      [formGroup]="form"
      (ngSubmit)="submit()"
    >

      <div class="input-group">

        <label>
          Producto
        </label>

        <input
          type="text"
          formControlName="product"
          placeholder="Ejemplo: Leche"
        >

        <small
          *ngIf="
            form.get('product')?.invalid &&
            form.get('product')?.touched
          "
        >
          El producto es obligatorio
        </small>

      </div>

      <div class="input-group">

        <label>
          Cantidad
        </label>

        <input
          type="number"
          formControlName="quantity"
        >

      </div>

      <div class="input-group">

        <label>
          Precio
        </label>

        <input
          type="number"
          formControlName="price"
          placeholder="0"
        >

      </div>

      <button type="submit">
        Guardar Venta
      </button>

      <button type="button" (click)="autofill()" style="margin-top: 10px; background-color: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.4); color: #ffe259; padding: 10px; border-radius: 4px; cursor: pointer; width: 100%;">
        ⚡ Llenar Rápido
      </button>

    </form>

  </div>

</div>
