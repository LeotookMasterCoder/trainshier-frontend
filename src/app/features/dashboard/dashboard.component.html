<!-- Cambiar tema -->
<button class="theme-toggle" (click)="toggleTheme()" aria-label="Cambiar tema">
  <svg class="ic-sun" *ngIf="!darkMode" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  <svg class="ic-moon" *ngIf="darkMode" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/></svg>
  <span>{{ darkMode ? 'Modo claro' : 'Modo oscuro' }}</span>
</button>

<main class="stage">
  <section class="card" role="region" aria-label="Bienvenida a TrainShier">
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>

    <!-- Alerta de ejemplo. Úsala para avisos del sistema. -->
    <div class="alert show" id="demoAlert" role="status">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>
      <span><b>Modo simulación.</b> Esta es una plataforma educativa de simulación POS; los datos no afectan sistemas comerciales reales.</span>
    </div>

    <div class="logo-badge-ts"><span>TS</span></div>
    <h1 class="brand">Train<b>Shier</b></h1>
    <p class="tagline">Plataforma de simulación POS para el fortalecimiento de competencias laborales en ambientes de formación.</p>

    <div class="actions">
      <button class="btn btn-primary" routerLink="/login">Iniciar sesión</button>
      <button class="btn btn-secondary" routerLink="/register">Registrarse</button>
    </div>

    <button class="btn btn-ghost" (click)="enterObserver()">Entrar como observador</button>

    <div class="divider"></div>
    <p class="foot">Ambiente de formación · Versión de práctica</p>
  </section>
</main>
