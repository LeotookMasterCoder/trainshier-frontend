<div class="auth-page-container">

  <div class="auth">
    
    <!-- ===== Left Brand Panel ===== -->
    <div class="brandside">
      <span class="corner tr"></span>
      <div class="logo-badge-ts"><span>TS</span></div>
      <h1>Train<b>Shier</b></h1>
      <p class="lead">Restablece tu contraseña de acceso para continuar tus prácticas de simulación de caja POS.</p>
    </div>

    <!-- ===== Right Form Panel ===== -->
    <div class="formside">
      <div class="top-row">
        <button class="btn btn-back" (click)="back()">
          ← Volver
        </button>
        
        <button class="icon-btn" (click)="toggleTheme()" aria-label="Cambiar tema">
          <svg class="ic-sun" *ngIf="!darkMode" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg class="ic-moon" *ngIf="darkMode" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/></svg>
        </button>
      </div>

      <h2>Recuperar Contraseña</h2>

      <!-- Alert Error Reusable -->
      <div class="alert error" [class.show]="errorMessage">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>
        <span>{{ errorMessage }}</span>
      </div>

      <!-- Alert Success Reusable -->
      <div class="alert show" *ngIf="successMessage" style="border-color: #D4A017; background: color-mix(in srgb, var(--gold) 15%, var(--surface)); margin-bottom: 20px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span>{{ successMessage }}</span>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()">
        
        <div class="field">
          <label for="rec-email">Correo electrónico</label>
          <div class="control">
            <input 
              id="rec-email"
              type="email" 
              formControlName="email" 
              placeholder="correo@trainshier.com"
              required
            >
          </div>
        </div>

        <div class="field">
          <label for="rec-pass">Nueva contraseña</label>
          <div class="control">
            <input 
              id="rec-pass"
              type="password" 
              formControlName="newPassword" 
              placeholder="********"
              required
            >
          </div>
          <small style="display: block; font-size: 12px; color: var(--text-mute); margin-top: 4px;">
            Mínimo 8 caracteres y 1 carácter especial.
          </small>
        </div>

        <div class="field">
          <label for="rec-confirm">Confirmar nueva contraseña</label>
          <div class="control">
            <input 
              id="rec-confirm"
              type="password" 
              formControlName="confirmPassword" 
              placeholder="********"
              required
            >
          </div>
        </div>

        <!-- Action Button -->
        <button 
          class="btn btn-primary main-btn" 
          type="submit"
        >
          Actualizar contraseña
        </button>

      </form>

      <div class="bottom-links">
        <span class="divider-text">¿Recordaste tu contraseña?</span>
        <a routerLink="/login">Iniciar sesión</a>
      </div>

    </div>

  </div>

</div>
