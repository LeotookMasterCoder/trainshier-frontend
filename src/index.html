<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>TrainshierFrontend</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="./assets/img/trainshier-logo.png">
  <script>
    const SW_VERSION = 'v3';
    const lastVersion = localStorage.getItem('sw_version');
    
    if ('serviceWorker' in navigator) {
      if (lastVersion !== SW_VERSION) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          let promises = [];
          for (let registration of registrations) {
            promises.push(registration.unregister());
          }
          Promise.all(promises).then(() => {
            localStorage.setItem('sw_version', SW_VERSION);
            console.log('Cache del Service Worker limpiada. Recargando...');
            window.location.reload();
          });
        });
      } else {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registrado con éxito', reg))
            .catch(err => console.error('Error al registrar Service Worker', err));
        });
      }
    }
  </script>
</head>
<body>
  <app-root></app-root>
  <!-- Chart.js CDN — available globally for reports and statistics charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</body>
</html>
